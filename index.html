<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>濟州島 7天6夜 家族旅行</title>
  <!-- 引入 Tailwind CSS 進行快速排版與美化 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 Vue.js 處理資料與互動 (編輯/刪除) -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <!-- 引入 FontAwesome 圖示 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* 隱藏滾動條但保留滾動功能，讓畫面更乾淨 */
    ::-webkit-scrollbar { display: none; }
    body { -ms-overflow-style: none; scrollbar-width: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    
    /* 點擊時的微動畫 */
    .btn-active:active { transform: scale(0.95); transition: transform 0.1s; }
    
    /* Vue 動畫過渡效果 */
    .list-enter-active, .list-leave-active { transition: all 0.4s ease; }
    .list-enter-from, .list-leave-to { opacity: 0; transform: translateX(-30px); }
    .modal-enter-active, .modal-leave-active { transition: opacity 0.3s ease; }
    .modal-enter-from, .modal-leave-to { opacity: 0; }
  </style>
</head>
<body class="bg-[#F4F5F4] text-gray-800 antialiased pb-20">

  <div id="app" class="max-w-md mx-auto relative">
    
    <!-- 頂部資訊區 (莫蘭迪藍) -->
    <header class="bg-[#7B9095] text-white p-6 rounded-b-[2.5rem] shadow-md relative z-10">
      <h1 class="text-3xl font-bold mb-2 tracking-wide">濟州島自駕行 🚗</h1>
      <p class="text-lg opacity-90 mb-4">7天6夜｜樂天租車</p>
      
      <!-- 航班資訊卡片 -->
      <div class="bg-white/20 rounded-2xl p-4 backdrop-blur-sm">
        <div class="flex items-center mb-2">
          <i class="fa-solid fa-plane-departure mr-3 text-xl"></i>
          <span class="text-lg font-medium">6/20 去程 IT632 (07:00-10:00)</span>
        </div>
        <div class="flex items-center">
          <i class="fa-solid fa-plane-arrival mr-3 text-xl"></i>
          <span class="text-lg font-medium">6/26 回程 IT633 (19:55-21:00)</span>
        </div>
      </div>
    </header>

    <!-- 行程列表區 -->
    <main class="px-4 mt-6">
      <div v-for="(day, dayIndex) in itinerary" :key="day.date" class="mb-8">
        
        <!-- 日期標題 -->
        <div class="flex items-center mb-4 sticky top-4 z-20">
          <div class="bg-[#99A89E] text-white px-5 py-2 rounded-full shadow-sm text-xl font-bold flex items-center">
            <i class="fa-regular fa-calendar-check mr-2"></i> {{ day.title }}
          </div>
        </div>

        <!-- 景點卡片列表 -->
        <transition-group name="list" tag="div" class="space-y-4">
          <div v-for="(event, eventIndex) in day.events" :key="event.id" 
               class="bg-white rounded-3xl p-5 shadow-sm border-l-[6px]"
               :style="{ borderColor: getBorderColor(eventIndex) }">
            
            <div class="flex justify-between items-start mb-3">
              <div class="flex-1 pr-2">
                <!-- 時間 -->
                <div class="text-[#A29CBA] font-bold text-lg mb-1 flex items-center" v-if="event.time">
                  <i class="fa-regular fa-clock mr-2"></i> {{ event.time }}
                </div>
                <!-- 景點名稱 -->
                <h3 class="text-2xl font-bold text-gray-800 leading-snug break-words">
                  {{ event.name }}
                </h3>
                
                <!-- 聯絡資訊區 (地址與電話) -->
                <div v-if="event.address || event.phone" class="mt-3 p-3 bg-gray-50 rounded-xl space-y-2">
                  <div v-if="event.phone" class="text-sm text-gray-700 flex items-center">
                    <div class="bg-[#99A89E]/20 w-7 h-7 rounded-full flex items-center justify-center mr-2">
                      <i class="fa-solid fa-phone text-[#99A89E] text-xs"></i>
                    </div>
                    <a :href="'tel:' + event.phone" class="font-bold text-[#7B9095] underline decoration-[#7B9095]/40 underline-offset-4 active:text-[#99A89E] transition-colors">{{ event.phone }}</a>
                  </div>
                  <div v-if="event.address" class="text-sm text-gray-700 flex items-start">
                    <div class="bg-[#99A89E]/20 w-7 h-7 rounded-full flex items-center justify-center mr-2 shrink-0">
                      <i class="fa-solid fa-location-dot text-[#99A89E] text-xs"></i>
                    </div>
                    <span class="leading-relaxed font-medium mt-0.5">{{ event.address }}</span>
                  </div>
                </div>

                <!-- 備註 -->
                <p v-if="event.note" class="text-gray-500 mt-3 text-base leading-relaxed border-t border-gray-100 pt-3">
                  {{ event.note }}
                </p>
              </div>
            </div>

            <!-- 互動按鈕區 -->
            <div class="flex flex-wrap gap-2 mt-2">
              <!-- 編輯按鈕 (莫蘭迪粉) -->
              <button @click="openEditModal(dayIndex, eventIndex)" 
                      class="flex-1 bg-[#D0A7A0]/10 text-[#D0A7A0] py-2.5 px-2 rounded-xl text-center font-bold text-base btn-active flex items-center justify-center gap-2 transition-colors hover:bg-[#D0A7A0] hover:text-white border border-[#D0A7A0]/30">
                <i class="fa-solid fa-pen"></i> 編輯
              </button>
              
              <!-- 刪除按鈕 (莫蘭迪紫) -->
              <button @click="openConfirmModal(dayIndex, eventIndex)" 
                      class="w-12 bg-gray-100 text-gray-400 py-2.5 rounded-xl text-center font-bold text-base btn-active flex items-center justify-center transition-colors hover:bg-[#A29CBA] hover:text-white">
                <i class="fa-solid fa-trash-can"></i>
              </button>
            </div>

          </div>
        </transition-group>

        </div>
      </div>
    </main>

    <!-- 自訂刪除確認視窗 -->

          <h3 class="text-xl font-bold text-gray-800 mb-2 flex items-center gap-2">
            <i class="fa-solid fa-triangle-exclamation text-red-400"></i> 確認刪除
          </h3>
          <p class="text-gray-600 mb-6">確定要刪除這個行程嗎？此動作無法復原。</p>
          <div class="flex justify-end gap-3">
            <button @click="showConfirmModal = false" class="px-5 py-2.5 rounded-xl bg-gray-100 text-gray-700 font-bold btn-active">取消</button>
            <button @click="confirmDelete" class="px-5 py-2.5 rounded-xl bg-[#A29CBA] text-white font-bold shadow-md btn-active">刪除</button>
          </div>
        </div>
      </div>
    </transition>

    <!-- 自訂編輯行程視窗 -->
    <transition name="modal">
      <div v-if="showEditModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/40 backdrop-blur-sm p-4">
        <div class="bg-white rounded-[2rem] p-6 max-w-[340px] w-full shadow-2xl max-h-[90vh] overflow-y-auto" style="-ms-overflow-style: none; scrollbar-width: none;">
          <h3 class="text-xl font-bold text-gray-800 mb-5 flex items-center gap-2 sticky top-0 bg-white z-10 pb-2">
            <i class="fa-solid fa-pen text-[#D0A7A0]"></i> 編輯行程
          </h3>
          <div class="space-y-4 mb-6">
            <div>
              <label class="block text-sm font-bold text-gray-600 mb-1">時間</label>
              <input v-model="editData.time" type="text" placeholder="例如: 10:00" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-[#99A89E] bg-gray-50 text-gray-800">
            </div>
            <div>
              <label class="block text-sm font-bold text-gray-600 mb-1">景點名稱 <span class="text-red-400">*</span></label>
              <input v-model="editData.name" type="text" placeholder="輸入景點或餐廳名稱" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-[#99A89E] bg-gray-50 text-gray-800">
            </div>
            <div>
              <label class="block text-sm font-bold text-gray-600 mb-1">電話 (選填)</label>
              <input v-model="editData.phone" type="text" placeholder="輸入聯絡電話" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-[#99A89E] bg-gray-50 text-gray-800">
            </div>
            <div>
              <label class="block text-sm font-bold text-gray-600 mb-1">地址 (選填)</label>
              <textarea v-model="editData.address" rows="2" placeholder="輸入地址" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-[#99A89E] bg-gray-50 text-gray-800 resize-none"></textarea>
            </div>
            <div>
              <label class="block text-sm font-bold text-gray-600 mb-1">備註 (可留白)</label>
              <textarea v-model="editData.note" rows="2" placeholder="詳細資訊或提醒" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-[#99A89E] bg-gray-50 text-gray-800 resize-none"></textarea>
            </div>
          </div>
          <div class="flex justify-end gap-3 sticky bottom-0 bg-white pt-2">
            <button @click="showEditModal = false" class="px-5 py-2.5 rounded-xl bg-gray-100 text-gray-700 font-bold btn-active">取消</button>
            <button @click="saveEdit" class="px-5 py-2.5 rounded-xl bg-[#D0A7A0] text-white font-bold shadow-md btn-active">儲存</button>
          </div>
        </div>
      </div>
    </transition>

  </div>

        const showEditModal = ref(false);
        const editData = ref({ dayIndex: null, eventIndex: null, time: '', name: '', phone: '', address: '', note: '' });

        // --- 刪除功能 ---

          confirmTarget.value = { dayIndex, eventIndex };
          showConfirmModal.value = true;
        };

          const { dayIndex, eventIndex } = confirmTarget.value;
          itinerary.value[dayIndex].events.splice(eventIndex, 1);
          showConfirmModal.value = false;
        };

        // --- 編輯功能 ---

          const event = itinerary.value[dayIndex].events[eventIndex];
          editData.value = {
            dayIndex,
            eventIndex,
            time: event.time || '',
            name: event.name || '',
            phone: event.phone || '',
            address: event.address || '',
            note: event.note || ''
          };
          showEditModal.value = true;
        };

        const saveEdit = () => {
          const { dayIndex, eventIndex, time, name, phone, address, note } = editData.value;
          
          if (!name.trim()) return; // 防止名稱為空
          
          const event = itinerary.value[dayIndex].events[eventIndex];
          event.time = time;
          event.name = name;
          event.phone = phone;
          event.address = address;
          event.note = note;
          
          showEditModal.value = false;
        };

        return {
          itinerary,
          getBorderColor,
          
          // 視窗變數
          showConfirmModal,
          showEditModal,
          editData,
          
          // 操作方法
          openConfirmModal,
          confirmDelete,
          openEditModal,
          saveEdit
        }
      }
    }).mount('#app')
  </script>
</body>
</html>
